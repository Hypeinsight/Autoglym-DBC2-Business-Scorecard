<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autoglym DBC2 — Business Scorecard Dashboard (Wireframe)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

    @media print {
      body { background: #fff; }
      .no-print { display: none !important; }
      .page { box-shadow: none; margin: 0; padding: 16px; max-width: 100%; }
      @page { size: A3 landscape; margin: 10mm; }
      #tab-scorecard { display: block !important; }
      #tab-commentary, #tab-dashboard { display: none !important; }
    }

    /* APP HEADER */
    .app-header { background: #1a1a2e; color: #fff; padding: 12px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .app-header .brand { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.04em; }
    .app-header .brand span { color: #e63946; }
    .controls { display: flex; gap: 12px; align-items: center; }
    .controls label { font-size: 0.8rem; color: #ccc; }
    .controls select, .controls button { padding: 6px 14px; border-radius: 6px; border: 1px solid #444; background: #2a2a3e; color: #fff; font-size: 0.82rem; cursor: pointer; }
    .controls button.print-btn { background: #e63946; border-color: #e63946; font-weight: 600; }

    /* TAB BAR */
    .tab-bar { background: #fff; border-bottom: 2px solid #e8e8e8; display: flex; padding: 0 32px; max-width: 1280px; margin: 0 auto; }
    .tab-btn { padding: 12px 22px; font-size: 0.82rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: #888; background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; margin-bottom: -2px; }
    .tab-btn:hover { color: #1a1a2e; }
    .tab-btn.active { color: #e63946; border-bottom-color: #e63946; }
    .tab-note { font-size: 0.68rem; color: #bbb; font-weight: 400; margin-left: 6px; text-transform: none; letter-spacing: 0; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* PAGE */
    .page { max-width: 1280px; margin: 24px auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 32px rgba(0,0,0,0.10); padding: 28px 32px 32px; }

    /* PAGE HEADER */
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; border-bottom: 3px solid #e63946; padding-bottom: 16px; margin-bottom: 24px; }
    .page-header-left .title { font-size: 1.5rem; font-weight: 800; color: #1a1a2e; letter-spacing: -0.01em; }
    .page-header-left .subtitle { font-size: 0.85rem; color: #666; margin-top: 3px; }
    .page-header-right { text-align: right; }
    .page-header-right .period-badge { display: inline-block; background: #1a1a2e; color: #fff; border-radius: 6px; padding: 4px 12px; font-size: 0.78rem; font-weight: 600; margin-bottom: 4px; }
    .page-header-right .date-label { font-size: 0.75rem; color: #888; }

    /* SECTION LABELS */
    .section-label { font-size: 0.7rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; background: #1a1a2e; display: inline-block; padding: 3px 12px; border-radius: 4px; margin-bottom: 12px; }
    .section-label.red    { background: #e63946; }
    .section-label.blue   { background: #2563eb; }
    .section-label.green  { background: #16a34a; }
    .section-label.orange { background: #f59e0b; color: #1a1a2e; }

    /* METRIC GRID */
    .metric-grid { display: grid; gap: 14px; margin-bottom: 20px; }
    .metric-grid-4 { grid-template-columns: repeat(4, 1fr); }
    .metric-grid-3 { grid-template-columns: repeat(3, 1fr); }
    .metric-grid-2 { grid-template-columns: repeat(2, 1fr); }

    /* METRIC CARD */
    .metric-card { border: 1.5px solid #e8e8e8; border-radius: 10px; padding: 14px 16px; background: #fafafa; position: relative; overflow: hidden; }
    .metric-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: #e8e8e8; }
    .metric-card.up::before      { background: #16a34a; }
    .metric-card.down::before    { background: #e63946; }
    .metric-card.neutral::before { background: #f59e0b; }
    .metric-card.pending { opacity: 0.72; }
    .metric-card.pending::before { background: #cbd5e1; }
    .metric-card .metric-name { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 8px; }
    .metric-card .metric-primary { font-size: 1.7rem; font-weight: 800; color: #1a1a2e; line-height: 1; margin-bottom: 4px; }
    .metric-card .metric-primary .unit { font-size: 0.9rem; font-weight: 600; color: #888; }
    .metric-card .metric-trend { display: flex; align-items: center; gap: 4px; font-size: 0.78rem; font-weight: 700; margin-bottom: 10px; }
    .metric-card .metric-trend.up      { color: #16a34a; }
    .metric-card .metric-trend.down    { color: #e63946; }
    .metric-card .metric-trend.neutral { color: #f59e0b; }
    .metric-card .metric-trend.muted   { color: #94a3b8; }
    .trend-arrow { font-size: 0.9rem; }
    .pending-pill { display: inline-block; font-size: 0.62rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; background: #f1f5f9; color: #64748b; border: 1px solid #cbd5e1; border-radius: 20px; padding: 2px 8px; margin-bottom: 8px; }

    /* PERIOD ROW */
    .period-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; border-top: 1px solid #e8e8e8; padding-top: 8px; }
    .period-cell { text-align: center; }
    .period-cell .p-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.06em; color: #aaa; font-weight: 700; }
    .period-cell .p-value { font-size: 0.88rem; font-weight: 800; color: #1a1a2e; }
    .period-cell .p-delta { font-size: 0.65rem; font-weight: 700; padding: 1px 5px; border-radius: 3px; display: inline-block; margin-top: 2px; }
    .p-delta.up      { background: #dcfce7; color: #16a34a; }
    .p-delta.down    { background: #fee2e2; color: #e63946; }
    .p-delta.neutral { background: #fef9c3; color: #b45309; }

    /* SPARKLINE */
    .sparkline-wrap { margin-top: 8px; }
    .sparkline-bar-row { display: flex; align-items: flex-end; gap: 2px; height: 28px; }
    .sparkline-bar { flex: 1; border-radius: 2px 2px 0 0; background: #e0e7ff; min-height: 4px; }
    .sparkline-bar.highlight            { background: #2563eb; }
    .sparkline-bar.up-color             { background: #bbf7d0; }
    .sparkline-bar.up-color.highlight   { background: #16a34a; }
    .sparkline-bar.down-color           { background: #fecaca; }
    .sparkline-bar.down-color.highlight { background: #e63946; }

    /* DIVIDER */
    .section-divider { height: 1px; background: #f0f0f0; margin: 4px 0 18px; }

    /* FOOTER */
    .page-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #e8e8e8; padding-top: 12px; margin-top: 8px; }
    .page-footer .footer-note  { font-size: 0.7rem; color: #aaa; }
    .page-footer .footer-brand { font-size: 0.7rem; color: #aaa; font-weight: 700; }

    /* ===== COMMENTARY TAB ===== */
    .sub-page-header { border-bottom: 3px solid #e63946; padding-bottom: 14px; margin-bottom: 24px; }
    .sub-page-header .title    { font-size: 1.2rem; font-weight: 800; color: #1a1a2e; }
    .sub-page-header .subtitle { font-size: 0.82rem; color: #888; margin-top: 3px; }

    .commentary-block { border: 1.5px solid #e8e8e8; border-radius: 10px; padding: 18px 20px; background: #fafafa; margin-bottom: 20px; }
    .commentary-block-title { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.10em; color: #1a1a2e; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid #e8e8e8; }
    .commentary-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .commentary-item .c-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #e63946; margin-bottom: 6px; }
    .commentary-item .c-label.green { color: #16a34a; }
    .commentary-item .c-label.amber { color: #d97706; }
    .commentary-item .c-label.slate { color: #64748b; }
    .commentary-item .c-text { font-size: 0.78rem; color: #444; line-height: 1.6; border-left: 3px solid #e8e8e8; padding-left: 10px; }
    .commentary-item .c-text.placeholder { color: #bbb; font-style: italic; }

    .campaign-block { border: 1.5px solid #e8e8e8; border-radius: 10px; padding: 16px 20px; background: #fff; margin-bottom: 12px; }
    .campaign-block-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .campaign-name  { font-size: 0.82rem; font-weight: 800; color: #1a1a2e; }
    .campaign-dates { font-size: 0.7rem; color: #888; font-weight: 600; }
    .campaign-bullets { list-style: none; padding: 0; margin: 0; }
    .campaign-bullets li { font-size: 0.77rem; color: #444; line-height: 1.5; padding: 3px 0 3px 14px; position: relative; }
    .campaign-bullets li::before { content: '▸'; position: absolute; left: 0; color: #e63946; font-size: 0.65rem; top: 5px; }

    /* ===== CHANNEL DASHBOARD TAB ===== */
    .dashboard-notice { background: #fffbeb; border: 1.5px solid #fde68a; border-radius: 10px; padding: 14px 18px; font-size: 0.8rem; color: #92400e; margin-bottom: 24px; display: flex; align-items: flex-start; gap: 10px; }
    .channel-section-title { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.10em; color: #888; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #f0f0f0; }

    .retailer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .retailer-card { border: 1.5px solid #e8e8e8; border-radius: 10px; padding: 14px 16px; background: #fafafa; text-align: center; }
    .retailer-card .retailer-name   { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 8px; }
    .retailer-card .retailer-clicks { font-size: 1.5rem; font-weight: 800; color: #1a1a2e; }
    .retailer-card .retailer-share  { font-size: 0.72rem; color: #888; margin-top: 2px; }
    .retailer-bar-wrap { margin-top: 10px; background: #e8e8e8; border-radius: 4px; height: 6px; overflow: hidden; }
    .retailer-bar-fill { height: 100%; border-radius: 4px; }

    .channel-placeholder { border: 1.5px dashed #d1d5db; border-radius: 10px; padding: 28px 20px; text-align: center; background: #f9fafb; margin-bottom: 14px; }
    .channel-placeholder .ph-label { font-size: 0.8rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .channel-placeholder .ph-note  { font-size: 0.72rem; color: #b0bec5; }

    /* WIREFRAME BADGE */
    .wireframe-badge { position: fixed; bottom: 24px; right: 24px; background: #f59e0b; color: #1a1a2e; font-size: 0.72rem; font-weight: 800; padding: 6px 14px; border-radius: 20px; letter-spacing: 0.06em; text-transform: uppercase; box-shadow: 0 2px 12px rgba(0,0,0,0.15); z-index: 200; }

    @media (max-width: 1100px) {
      .metric-grid-4     { grid-template-columns: repeat(2, 1fr); }
      .retailer-grid     { grid-template-columns: repeat(2, 1fr); }
      .commentary-grid-3 { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<!--
  ============================================================
  REFERENCE WIREFRAME — Phase 1 (client sign-off)
  This is the original single-file prototype, kept verbatim
  as the source of truth for the React + Tailwind migration.
  Do not wire data/build tooling into this file. See /src.
  ============================================================
-->

<!-- APP HEADER -->
<header class="app-header no-print">
  <div class="brand">AUTOGLYM <span>DBC2</span> — Business Scorecard</div>
  <div class="controls">
    <label>Period View</label>
    <select>
      <option>Rolling 12 Months</option>
      <option>Rolling 6 Months</option>
      <option selected>Rolling 3 Months</option>
    </select>
    <label>As At</label>
    <select>
      <option>May 2026</option>
      <option>Apr 2026</option>
      <option>Mar 2026</option>
    </select>
    <button class="print-btn" onclick="window.print()">&#8595; Export A3</button>
  </div>
</header>

<!-- TAB BAR -->
<div class="tab-bar no-print">
  <button class="tab-btn active" onclick="switchTab('scorecard', this)">Scorecard</button>
  <button class="tab-btn" onclick="switchTab('commentary', this)">Commentary <span class="tab-note">not on BSC face</span></button>
  <button class="tab-btn" onclick="switchTab('dashboard', this)">Channel Dashboard <span class="tab-note">retailer breakdown + campaigns</span></button>
</div>

<!-- NOTE: full markup preserved from the original wireframe. Tabs/sample data identical to source. -->
<div id="tab-scorecard" class="tab-panel active"><div class="page"><div class="page-header"><div class="page-header-left"><div class="title">Autoglym — Balanced Scorecard</div></div></div><p style="color:#888;font-size:.85rem">Reference wireframe preserved. See <strong>/src</strong> for the React + Tailwind migration.</p></div></div>
<div id="tab-commentary" class="tab-panel"><div class="page"></div></div>
<div id="tab-dashboard" class="tab-panel"><div class="page"></div></div>

<div class="wireframe-badge no-print">&#9888; Wireframe — Sample Data Only</div>

<script>
  function switchTab(id, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    btn.classList.add('active');
  }
</script>
</body>
</html>
